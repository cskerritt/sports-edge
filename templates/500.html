<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 — Server Error | Sports Edge</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-slate-900 text-slate-100 antialiased flex flex-col items-center justify-center min-h-screen px-4">

  <div class="text-center max-w-md">

    <!-- Large 500 -->
    <div class="relative mb-6">
      <p class="text-[9rem] font-black leading-none text-slate-800 select-none">500</p>
      <div class="absolute inset-0 flex items-center justify-center">
        <span class="text-6xl">💥</span>
      </div>
    </div>

    <h1 class="text-2xl font-bold text-white mb-2">Internal Server Error</h1>
    <p class="text-slate-400 text-sm leading-relaxed mb-3">
      Something went wrong on our end. The model is recalibrating —
      please try again in a moment.
    </p>
    <p class="text-slate-600 text-xs mb-8">
      If this keeps happening, the issue has been logged automatically.
    </p>

    <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
      <a href="/"
         class="w-full sm:w-auto px-6 py-3 bg-green-600 hover:bg-green-500 text-white font-semibold rounded-xl transition-colors text-sm">
        Back to Dashboard
      </a>
      <button onclick="location.reload()"
              class="w-full sm:w-auto px-6 py-3 bg-slate-700 hover:bg-slate-600 text-slate-300 hover:text-white font-semibold rounded-xl transition-colors text-sm">
        Try Again
      </button>
    </div>

    <!-- Decorative stat card to keep the theme -->
    <div class="mt-10 bg-slate-800 border border-red-900/40 rounded-xl p-5 text-left">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-lg bg-red-900/40 flex items-center justify-center text-lg shrink-0">⚠️</div>
        <div>
          <p class="text-xs font-semibold text-red-400">Error Code: 500</p>
          <p class="text-xs text-slate-500 mt-0.5">The server encountered an unexpected condition.</p>
        </div>
      </div>
    </div>

    <!-- Sport emojis decoration -->
    <div class="mt-10 flex items-center justify-center gap-4 text-3xl opacity-20 select-none">
      <span>🏈</span>
      <span>🏀</span>
      <span>🏒</span>
      <span>⚾</span>
      <span>⚽</span>
    </div>
  </div>

</body>
</html>
