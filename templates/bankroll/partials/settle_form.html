<form hx-post="{% url 'bankroll:settle_bet' bet.pk %}"
      hx-target="#settle-section"
      hx-swap="outerHTML"
      hx-indicator="#htmx-indicator"
      class="space-y-4"
      x-data="{
        outcome: '',
        exitPrice: 0,
        amount: {{ bet.amount|default:0 }},
        entryPrice: {{ bet.entry_price|default:0 }},
        get pnl() {
          if (!this.outcome || this.exitPrice <= 0) return null;
          if (this.outcome === 'WON') {
            return ((1 - this.entryPrice) * (this.amount / this.entryPrice)).toFixed(2);
          } else if (this.outcome === 'LOST') {
            return (-this.amount).toFixed(2);
          } else if (this.outcome === 'PUSH') {
            return '0.00';
          }
          return null;
        }
      }">
  {% csrf_token %}

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

    <!-- Outcome -->
    <div>
      <label class="block text-sm font-medium text-slate-300 mb-1.5">Outcome</label>
      <select name="outcome"
              x-model="outcome"
              required
              class="w-full px-4 py-3 bg-slate-900 border border-slate-600 rounded-xl text-white focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 transition-colors">
        <option value="">— Select outcome —</option>
        <option value="WON">Won</option>
        <option value="LOST">Lost</option>
        <option value="PUSH">Push</option>
        <option value="VOID">Void</option>
      </select>
    </div>

    <!-- Exit price -->
    <div>
      <label class="block text-sm font-medium text-slate-300 mb-1.5">Exit / Settlement Price</label>
      <div class="relative">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-medium">$</span>
        <input type="number"
               name="exit_price"
               x-model="exitPrice"
               step="0.01" min="0" max="1"
               placeholder="0.00–1.00"
               class="w-full pl-7 pr-4 py-3 bg-slate-900 border border-slate-600 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 transition-colors" />
      </div>
      <p class="text-xs text-slate-500 mt-1">1.00 for full win, 0.00 for full loss</p>
    </div>
  </div>

  <!-- Calculated P&L preview -->
  <div x-show="outcome && pnl !== null"
       x-transition
       class="flex items-center gap-3 px-4 py-3 rounded-xl border"
       :class="parseFloat(pnl) >= 0 ? 'bg-green-900/20 border-green-700/40' : 'bg-red-900/20 border-red-700/40'">
    <svg class="w-4 h-4 shrink-0" :class="parseFloat(pnl) >= 0 ? 'text-green-400' : 'text-red-400'" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 11h.01M12 11h.01M15 11h.01M4 19h16a2 2 0 002-2V7a2 2 0 00-2-2H4a2 2 0 00-2 2v10a2 2 0 002 2z" />
    </svg>
    <span class="text-sm font-medium" :class="parseFloat(pnl) >= 0 ? 'text-green-300' : 'text-red-300'">
      Estimated P&amp;L:
      <span class="font-bold font-mono" x-text="(parseFloat(pnl) >= 0 ? '+' : '') + '$' + pnl"></span>
    </span>
  </div>

  <!-- Notes -->
  <div>
    <label class="block text-sm font-medium text-slate-300 mb-1.5">
      Settlement Notes <span class="text-slate-500 font-normal">(optional)</span>
    </label>
    <textarea name="settle_notes" rows="2"
              placeholder="Any notes about the outcome..."
              class="w-full px-4 py-3 bg-slate-900 border border-slate-600 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 transition-colors resize-none"></textarea>
  </div>

  <div class="flex items-center gap-3">
    <button type="submit"
            :disabled="!outcome"
            :class="outcome ? 'bg-amber-600 hover:bg-amber-500 cursor-pointer' : 'bg-slate-700 cursor-not-allowed opacity-50'"
            class="px-6 py-2.5 text-white font-semibold rounded-xl transition-colors focus:outline-none focus:ring-2 focus:ring-amber-500/40">
      Settle Bet
    </button>
    <p class="text-xs text-slate-500">This action cannot be undone.</p>
  </div>
</form>
