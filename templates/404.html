<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Sports Edge</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-slate-900 text-slate-100 antialiased flex flex-col items-center justify-center min-h-screen px-4">

  <div class="text-center max-w-md">

    <!-- Large 404 -->
    <div class="relative mb-6">
      <p class="text-[9rem] font-black leading-none text-slate-800 select-none">404</p>
      <div class="absolute inset-0 flex items-center justify-center">
        <span class="text-6xl">⚡</span>
      </div>
    </div>

    <h1 class="text-2xl font-bold text-white mb-2">Page Not Found</h1>
    <p class="text-slate-400 text-sm leading-relaxed mb-8">
      The page you're looking for doesn't exist or has been moved.
      Looks like this one's out of bounds.
    </p>

    <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
      <a href="/"
         class="w-full sm:w-auto px-6 py-3 bg-green-600 hover:bg-green-500 text-white font-semibold rounded-xl transition-colors text-sm">
        Back to Dashboard
      </a>
      <a href="javascript:history.back()"
         class="w-full sm:w-auto px-6 py-3 bg-slate-700 hover:bg-slate-600 text-slate-300 hover:text-white font-semibold rounded-xl transition-colors text-sm">
        Go Back
      </a>
    </div>

    <!-- Sport emojis decoration -->
    <div class="mt-12 flex items-center justify-center gap-4 text-3xl opacity-20 select-none">
      <span>🏈</span>
      <span>🏀</span>
      <span>🏒</span>
      <span>⚾</span>
      <span>⚽</span>
    </div>
  </div>

</body>
</html>
