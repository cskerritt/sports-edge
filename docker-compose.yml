services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sports_edge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=local-dev-secret-key-not-for-production
      - DEBUG=True
      - ALLOWED_HOSTS=*
      - DATABASE_URL=postgres://postgres:postgres@db:5432/sports_edge
      - DJANGO_SETTINGS_MODULE=sports_edge.settings.development
      - PORT=8000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
